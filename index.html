<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A sign up form with custom validations</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <main class="wrapper">
      <h2>Sign Up</h2>

      <form novalidate>
        <div class="input-group">
          <div class="input-wrapper">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="first-name" />
            <p id="first-name-error" class="error"></p>
          </div>

          <div class="input-wrapper">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="last-name" />
            <p id="last-name-error" class="error"></p>
          </div>
        </div>

        <div class="input-wrapper">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" />
          <p id="email-error" class="error"></p>
        </div>

        <div class="input-group">
          <div class="input-wrapper">
            <label for="country">Country</label>
            <select type="select" id="country" name="country">
              <option value="">Select a Country</option>
              <option value="fr">France</option>
              <option value="de">Germany</option>
              <option value="ch">Switzerland</option>
              <option value="nl">The Netherlands</option>
            </select>
            <p id="country-error" class="error"></p>
          </div>

          <div class="input-wrapper">
            <label for="postal-code">Postal Code</label>
            <input type="text" id="postal-code" name="postal-code" />
            <p id="postal-code-error" class="error"></p>
          </div>
        </div>

        <div class="input-wrapper">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" />
          <p id="password-error" class="error"></p>
        </div>

        <div class="input-wrapper">
          <label for="confirmation">Confirm Password</label>
          <input type="password" id="confirmation" name="confirmation" />
          <p id="confirmation-error" class="error"></p>
        </div>

        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
